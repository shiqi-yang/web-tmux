<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — tmux-proxy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #1a1a2e; font-family: system-ui, sans-serif;
    }
    .card {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 8px; padding: 2rem; width: min(320px, calc(100% - 2rem));
    }
    h1 { color: #e2e8f0; font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center; }
    label { display: block; color: #94a3b8; font-size: .875rem; margin-bottom: .25rem; }
    input {
      width: 100%; padding: .5rem .75rem; border-radius: 4px;
      border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
      font-size: 1rem; margin-bottom: 1rem; outline: none;
    }
    input:focus { border-color: #3b82f6; }
    button {
      width: 100%; padding: .6rem; border-radius: 4px; border: none;
      background: #3b82f6; color: #fff; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .error { color: #f87171; font-size: .875rem; margin-top: .75rem; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>tmux-proxy</h1>
    <label for="username">用户名</label>
    <input id="username" type="text" autocomplete="username" autofocus />
    <label for="password">密码</label>
    <input id="password" type="password" autocomplete="current-password" />
    <button id="loginBtn">登录</button>
    <div id="error" class="error"></div>
  </div>
  <script type="module">
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error');
      errEl.textContent = '';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || '登录失败'; return; }
        localStorage.setItem('token', data.token);
        location.href = '/';
      } catch {
        errEl.textContent = '网络错误';
      }
    }

    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
